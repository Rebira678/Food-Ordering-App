name: saffron_eats
description: SaffronEats — Premium Food Ordering App for Adama, Ethiopia. A multi-vendor food delivery platform built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Local Storage
  shared_preferences: ^2.3.1

  # Backend
  supabase_flutter: ^2.5.0

  # Images
  cached_network_image: ^3.3.1

  # Charts (Owner Dashboard)
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  flutter_dotenv: ^6.0.1
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
